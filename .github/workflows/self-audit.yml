name: self-audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  self-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Run self audit
        run: bash scripts/self-audit.sh
      - name: Run maintenance scan
        run: bash scripts/maintenance-scan.sh
